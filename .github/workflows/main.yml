name: Generar SVG personalizado

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generar SVG
        run: |
          USER="Jaminton2007"

          REPOS=$(curl -s https://api.github.com/users/$USER | jq .public_repos)
          FOLLOWERS=$(curl -s https://api.github.com/users/$USER | jq .followers)

          printf "<svg width='400' height='120' viewBox='0 0 400 120' xmlns='http://www.w3.org/2000/svg'><rect width='100%%' height='100%%' fill='#0d1117'/><text x='20' y='30' fill='#58a6ff' font-size='18'>GitHub Stats</text><text x='20' y='60' fill='#c9d1d9' font-size='14'>User: %s</text><text x='20' y='80' fill='#c9d1d9' font-size='14'>Repos: %s</text><text x='20' y='100' fill='#c9d1d9' font-size='14'>Followers: %s</text></svg>" "$USER" "$REPOS" "$FOLLOWERS" > github-stats.svg

      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add github-stats.svg
          git commit -m "update stats" || exit 0
          git push
