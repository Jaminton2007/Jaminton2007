name: Generate GitHub Stats SVG

on:
  schedule:
    - cron: "0 */6 * * *" # cada 6 horas
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate SVG
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER=$(echo $GITHUB_REPOSITORY | cut -d'/' -f1)
          REPO=$(echo $GITHUB_REPOSITORY | cut -d'/' -f2)

          API="https://api.github.com/repos/$OWNER/$REPO"

          # -------- COMMITS (últimos 100) --------
          COMMITS=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "$API/commits?per_page=100" | jq 'length // 0')

          # -------- PRs cerrados (últimos 100) --------
          PRS=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "$API/pulls?state=closed&per_page=100" | jq 'length // 0')

          # -------- STARS --------
          STARS=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "$API" | jq '.stargazers_count // 0')

          # -------- FORKS --------
          FORKS=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "$API" | jq '.forks_count // 0')

          # -------- SVG --------
          cat <<EOF > github-stats.svg
          <svg xmlns="http://www.w3.org/2000/svg" width="350" height="220">
            <rect width="100%" height="100%" fill="#0d1117"/>
            
            <text x="50%" y="40" text-anchor="middle" fill="#58a6ff" font-size="20" font-family="Arial">
              GitHub Stats
            </text>

            <text x="50%" y="80" text-anchor="middle" fill="#c9d1d9" font-size="14">
              Repo: $REPO
            </text>

            <text x="50%" y="110" text-anchor="middle" fill="#c9d1d9">
              Commits (last 100): $COMMITS
            </text>

            <text x="50%" y="135" text-anchor="middle" fill="#c9d1d9">
              PRs closed (last 100): $PRS
            </text>

            <text x="50%" y="160" text-anchor="middle" fill="#c9d1d9">
              ⭐ Stars: $STARS
            </text>

            <text x="50%" y="185" text-anchor="middle" fill="#c9d1d9">
              🍴 Forks: $FORKS
            </text>
          </svg>
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add github-stats.svg

          # evita error si no hay cambios
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update github stats"
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
