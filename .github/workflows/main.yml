name: Generate Custom SVG

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate SVG
        run: |
          USER="Jaminton2007"
          REPOS=$(curl -s https://api.github.com/users/$USER | jq .public_repos)
          FOLLOWERS=$(curl -s https://api.github.com/users/$USER | jq .followers)
          STARS=$(curl -s "https://api.github.com/users/$USER/repos?per_page=100" | jq '[.[] | .stargazers_count] | add // 0')
          printf "<svg width='500' height='150' viewBox='0 0 500 150' xmlns='http://www.w3.org/2000/svg'>
            <defs>
              <linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'>
                <stop offset='0%' style='stop-color:#0d1117;stop-opacity:1' />
                <stop offset='100%' style='stop-color:#161b22;stop-opacity:1' />
              </linearGradient>
            </defs>
            <rect width='100%%' height='100%%' fill='url(#grad)' rx='10'/>
            <text x='20' y='30' fill='#58a6ff' font-size='20' font-family='Arial, sans-serif' font-weight='bold'>GitHub Stats</text>
            <text x='20' y='55' fill='#c9d1d9' font-size='16' font-family='Arial, sans-serif'>User: %s</text>
            <text x='20' y='80' fill='#c9d1d9' font-size='16' font-family='Arial, sans-serif'>Repos: %s</text>
            <text x='20' y='105' fill='#c9d1d9' font-size='16' font-family='Arial, sans-serif'>Followers: %s</text>
            <text x='20' y='130' fill='#c9d1d9' font-size='16' font-family='Arial, sans-serif'>Stars: %s</text>
          </svg>" "$USER" "$REPOS" "$FOLLOWERS" "$STARS" > github-stats.svg

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add github-stats.svg
          git commit -m "update stats" || exit 0
          git pull --rebase
          git push
