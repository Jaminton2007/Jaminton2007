name: Generate GitHub Stats SVG

on:
  schedule:
    - cron: "0 */6 * * *" # cada 6 horas
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate SVG
        run: |
          OWNER=$(echo $GITHUB_REPOSITORY | cut -d'/' -f1)
          REPO=$(echo $GITHUB_REPOSITORY | cut -d'/' -f2)

          # Total commits (últimos datos disponibles)
          COMMITS=$(curl -s https://api.github.com/repos/$OWNER/$REPO/commits | jq 'length')

          # Pull requests cerrados
          PRS=$(curl -s "https://api.github.com/repos/$OWNER/$REPO/pulls?state=closed" | jq 'length')

          # Crear SVG
          cat <<EOF > github-stats.svg
          <svg xmlns="http://www.w3.org/2000/svg" width="300" height="200">
            <rect width="100%" height="100%" fill="#f5f5f5"/>
            <text x="50%" y="40" text-anchor="middle" font-size="20">GitHub Stats</text>
            <text x="50%" y="80" text-anchor="middle">Repo: $REPO</text>
            <text x="50%" y="110" text-anchor="middle">Commits: $COMMITS</text>
            <text x="50%" y="140" text-anchor="middle">PRs cerrados: $PRS</text>
          </svg>
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add github-stats.svg
          git diff --cached --quiet || git commit -m "update stats"
          git push

      - name: Deploy SVG
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
