name: Generate GitHub Stats SVG

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate SVG
        run: |
          # Get repository information
          REPO_NAME=$(basename $GITHUB_REPOSITORY)
          OWNER_NAME=$(echo $GITHUB_REPOSITORY | cut -d'/' -f1)
          REPO_URL="https://github.com/$OWNER_NAME/$REPO_NAME"

          # Get repository stats
          RESPONSE=$(curl -s "https://api.github.com/repos/$GITHUB_REPOSITORY/stats")
          TOTAL_COMMITS=$(echo $RESPONSE | jq '.total | tonumber')
          TOTAL_PULL_REQUESTS=$(echo $RESPONSE | jq '.pullRequests | .closed | map(.number) | add | tonumber')

          # Generate SVG
          echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?>" > github-stats.svg
          echo "<svg xmlns=\"http://www.w3.org/2000/svg\" version=\"1.1\">" >> github-stats.svg
          echo "<rect width=\"300\" height=\"200\" style=\"fill:rgb(245, 245, 245);\"/>" >> github-stats.svg
          echo "<text x=\"150\" y=\"50\" font-size=\"24\" text-anchor=\"middle\" fill=\"rgb(77, 77, 77)\">GitHub Stats</text>" >> github-stats.svg
          echo "<text x=\"150\" y=\"90\" font-size=\"18\" text-anchor=\"middle\" fill=\"rgb(77, 77, 77)\">@$REPO_NAME</text>" >> github-stats.svg
          echo "<text x=\"150\" y=\"120\" font-size=\"18\" text-anchor=\"middle\" fill=\"rgb(77, 77, 77)\">Total Commits: $TOTAL_COMMITS</text>" >> github-stats.svg
          echo "<text x=\"150\" y=\"140\" font-size=\"18\" text-anchor=\"middle\" fill=\"rgb(77, 77, 77)\">Total Pull Requests: $TOTAL_PULL_REQUESTS</text>" >> github-stats.svg
          echo "</svg>" >> github-stats.svg

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add github-stats.svg
          git commit -m "update stats"
          git push origin main

      - name: Deploy SVG
        uses: JamesIves/github-pages-deploy-action@v4.2.4
        with:
          branch: gh-pages
          folder: .
